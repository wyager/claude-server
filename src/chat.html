<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Server Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #eee;
    height: 100vh;
    display: flex;
    flex-direction: column;
}
#header {
    padding: 12px 20px;
    background: #16213e;
    border-bottom: 1px solid #333;
    font-size: 14px;
    color: #888;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
#header .title { color: #ccc; font-weight: 600; }
#status { font-size: 12px; }
#status.connected { color: #4ade80; }
#status.error { color: #f87171; }
#messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.msg {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
}
.msg.user {
    align-self: flex-end;
    background: #2563eb;
    color: #fff;
    border-bottom-right-radius: 4px;
}
.msg.agent {
    align-self: flex-start;
    background: #374151;
    color: #e5e7eb;
    border-bottom-left-radius: 4px;
}
.msg .meta {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
}
#input-area {
    padding: 16px 20px;
    background: #16213e;
    border-top: 1px solid #333;
    display: flex;
    gap: 10px;
}
#input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #444;
    border-radius: 8px;
    background: #1a1a2e;
    color: #eee;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    resize: none;
}
#input:focus { border-color: #2563eb; }
#send {
    padding: 10px 20px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
}
#send:hover { background: #1d4ed8; }
#send:disabled { background: #555; cursor: not-allowed; }
.msg.typing {
    opacity: 0.6;
    font-style: italic;
}
</style>
</head>
<body>
<div id="header">
    <span class="title">Claude Server Chat</span>
    <span id="status">connecting...</span>
</div>
<div id="messages"></div>
<div id="input-area">
    <textarea id="input" rows="1" placeholder="Type a message..." autofocus></textarea>
    <button id="send" onclick="sendMessage()">Send</button>
</div>

<script>
const API_URL = "{{API_URL}}";
const CHAT_ID = crypto.randomUUID();
const seenIds = new Set();
let eventSource = null;
let typingEl = null;

const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("input");
const statusEl = document.getElementById("status");

// Auto-resize textarea
inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
});

// Enter to send (Shift+Enter for newline)
inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

function appendMessage(role, content, time) {
    removeTypingIndicator();
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.textContent = content;
    if (time) {
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = time;
        div.appendChild(meta);
    }
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTypingIndicator() {
    if (typingEl) return;
    typingEl = document.createElement("div");
    typingEl.className = "msg agent typing";
    typingEl.textContent = "thinking...";
    messagesEl.appendChild(typingEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function updateTypingIndicator(status) {
    if (status === "thinking") {
        showTypingIndicator();
        if (typingEl) typingEl.textContent = "thinking...";
    } else if (status === "executing") {
        showTypingIndicator();
        if (typingEl) typingEl.textContent = "executing...";
    } else if (status === "idle") {
        removeTypingIndicator();
    }
}

function removeTypingIndicator() {
    if (typingEl) {
        typingEl.remove();
        typingEl = null;
    }
}

// Connect SSE for real-time messages and status
function connectSSE() {
    if (eventSource) eventSource.close();

    eventSource = new EventSource(`${API_URL}/messages/${CHAT_ID}/stream`);

    eventSource.addEventListener("message", (e) => {
        const msg = JSON.parse(e.data);
        if (!seenIds.has(msg.id)) {
            seenIds.add(msg.id);
            appendMessage("agent", msg.content, msg.created_at);
        }
    });

    eventSource.addEventListener("status", (e) => {
        const data = JSON.parse(e.data);
        updateTypingIndicator(data.status);
    });

    eventSource.addEventListener("open", () => {
        statusEl.textContent = "connected";
        statusEl.className = "connected";
    });

    eventSource.addEventListener("error", () => {
        statusEl.textContent = "reconnecting...";
        statusEl.className = "error";
        // EventSource auto-reconnects
    });
}

// Load any existing messages (catch-up) then connect SSE
async function init() {
    try {
        const res = await fetch(`${API_URL}/messages/${CHAT_ID}`);
        const data = await res.json();
        for (const msg of data.messages) {
            if (!seenIds.has(msg.id)) {
                seenIds.add(msg.id);
                appendMessage("agent", msg.content, msg.created_at);
            }
        }
        statusEl.textContent = "connected";
        statusEl.className = "connected";
    } catch {
        statusEl.textContent = "disconnected";
        statusEl.className = "error";
    }
    connectSSE();
}

async function sendMessage() {
    const content = inputEl.value.trim();
    if (!content) return;

    appendMessage("user", content);
    inputEl.value = "";
    inputEl.style.height = "auto";

    try {
        await fetch(`${API_URL}/message`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                user: "chat-ui",
                content: content
            })
        });
    } catch (err) {
        appendMessage("agent", `[Error sending message: ${err.message}]`);
    }
}

init();
</script>
</body>
</html>
